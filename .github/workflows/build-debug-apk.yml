name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest   # 16GB RAM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # キャッシュはここでは無効にして手動管理
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # AGP/Kotlin バージョン変更時はキャッシュキーに versions hash を含め
      # 旧キャッシュを自動的に無視させる
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Clean Gradle transform caches (avoid stale D8 transforms)
        run: |
          rm -rf ~/.gradle/caches/transforms-* || true
          echo "Cleaned transform caches"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --max-workers=2 --build-cache
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== APK Build Summary ==="
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          echo "SHA256: $(sha256sum app/build/outputs/apk/debug/app-debug.apk)"
