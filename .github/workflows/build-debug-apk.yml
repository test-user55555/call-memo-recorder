name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest   # 16GB RAM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Clean Gradle transform caches (avoid stale D8 transforms)
        run: |
          rm -rf ~/.gradle/caches/transforms-* || true
          echo "Cleaned transform caches"

      # ── 固定 debug.keystore を復元（更新インストールの署名一致のため） ──
      - name: Restore fixed debug keystore
        run: |
          mkdir -p "$HOME/.android"
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$HOME/.android/debug.keystore"
          echo "Keystore restored: $(ls -lh $HOME/.android/debug.keystore)"

      - name: Extract version name
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName\s*=\s*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/.*versionCode\s*=\s*\([0-9]*\).*/\1/')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "APK version: ${VERSION_NAME} (${VERSION_CODE})"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --max-workers=2 --no-build-cache
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"

      - name: Rename APK with version
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/CallMemoRecorder-v${VERSION}-debug.apk
          echo "Renamed to CallMemoRecorder-v${VERSION}-debug.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CallMemoRecorder-v${{ steps.version.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/CallMemoRecorder-v${{ steps.version.outputs.version_name }}-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== APK Build Summary ==="
          echo "Version: ${{ steps.version.outputs.version_name }} (code: ${{ steps.version.outputs.version_code }})"
          ls -lh app/build/outputs/apk/debug/CallMemoRecorder-v${{ steps.version.outputs.version_name }}-debug.apk
          echo "SHA256: $(sha256sum app/build/outputs/apk/debug/CallMemoRecorder-v${{ steps.version.outputs.version_name }}-debug.apk)"
